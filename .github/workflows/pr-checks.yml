name: PR Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  affected-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get changed files
        id: changed-files
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(ts|tsx)$' \
            | grep -v '\.test\.' \
            | grep -v '\.spec\.' \
            | tr '\n' ' ')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed source files: $CHANGED"

      - name: Run affected tests
        if: steps.changed-files.outputs.files != ''
        run: |
          read -ra FILES <<< "${{ steps.changed-files.outputs.files }}"
          npx vitest related --run "${FILES[@]}"
        shell: bash

      - name: No source files changed
        if: steps.changed-files.outputs.files == ''
        run: echo "No TypeScript source files changed, skipping tests."

  migration-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Check for missing migrations
        run: |
          SCHEMA_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'prisma/schema.prisma' || true)
          NEW_MIGRATION=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'prisma/migrations/' || true)

          if [ -n "$SCHEMA_CHANGED" ] && [ -z "$NEW_MIGRATION" ]; then
            echo "Error: prisma/schema.prisma was modified but no migration file was added."
            echo "Run 'npx prisma migrate dev --name <migration-name>' to create one."
            exit 1
          fi

  coverage:
    runs-on: ubuntu-latest
    needs: affected-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Post coverage comment on PR
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
