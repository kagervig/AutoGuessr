name: Tag Images

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tagger
        run: npm run tag-images -- --limit 10 2>&1 | tee output.log
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
          GEMINI_API_KEY_8: ${{ secrets.GEMINI_API_KEY_8 }}
          GEMINI_API_KEY_9: ${{ secrets.GEMINI_API_KEY_9 }}
          GEMINI_API_KEY_10: ${{ secrets.GEMINI_API_KEY_10 }}
          GEMINI_API_KEY_11: ${{ secrets.GEMINI_API_KEY_11 }}
          GEMINI_API_KEY_12: ${{ secrets.GEMINI_API_KEY_12 }}

      - name: Build summary
        run: |
          TOTAL=$(grep -c "Tagged image" output.log || echo 0)
          KEYS=$(grep -o "GEMINI_API_KEY_[0-9]\+" output.log | sort -u | tr '\n' ',' || echo "")

          echo "Images tagged: $TOTAL" > summary.txt
          echo "Keys used: $KEYS" >> summary.txt

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Image Tagging Cron - ${{ job.status }}"
          to: kristianallin@aol.com
          from: GitHub Actions
          body: file://summary.txt
